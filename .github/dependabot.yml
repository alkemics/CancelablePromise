version: 2
registries:
  registry-npm-salsify:
    type: npm-registry
    url: https://npm.salsify.com/api/npm/npm-local/
    token: '${{secrets.ARTIFACTORY_TOKEN}}'
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: daily
    open-pull-requests-limit: 5
    cooldown:
      default-days: 21
      exclude:
        - "@alkem/*"
    groups:
      internal-deps-minor-and-patch:
        applies-to: version-updates
        patterns:
          - "@alkem/*"
        update-types:
          - "minor"
          - "patch"
      external-deps-minor-and-patch:
        applies-to: version-updates
        patterns:
          - "*"
        exclude-patterns:
          - "@alkem/*"
        update-types:
          - "minor"
          - "patch"
    registries:
      - registry-npm-salsify
    versioning-strategy: increase
    commit-message:
      prefix: chore(deps)
      prefix-development: chore(dev-deps)
